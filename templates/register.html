{% extends "base.html" %}

{% block title %}Регистрация — Дневник путешествий{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>Регистрация нового пользователя</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя:</label>
                        <input type="text" class="form-control" id="username" name="username"
                               value="{{ request.form.username }}" required minlength="3">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ request.form.email }}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль:</label>
                <input type="password" class="form-control" id="password" name="password"
                       required minlength="6">
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">Подтвердите пароль:</label>
                <input type="password" class="form-control" id="confirm_password"
                       name="confirm_password" required>
            </div>

            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary">Войти</a>
        </form>
    </div>
</div>
{% endblock %}
